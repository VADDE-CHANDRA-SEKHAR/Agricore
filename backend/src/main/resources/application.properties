# Server
server.port=8080

# Groq API Key (loaded from environment variable GROQ_API_KEY)
groq.api.key=${GROQ_API_KEY}

# Increase max request size for image uploads (base64 encoded)
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
server.tomcat.max-http-form-post-size=20MB

# Logging
logging.level.com.agricore=INFO